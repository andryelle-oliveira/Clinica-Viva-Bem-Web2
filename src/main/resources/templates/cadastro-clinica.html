<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>VivaBem - Cadastro de Clínica</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #1a1e23; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 50px; background-color: #1a1e23; }
        .logo { color: #22c55e; font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        .menu a { color: #ccc; text-decoration: none; margin-left: 20px; font-size: 0.9rem; }
        .btn-cadastrar-nav { background-color: #22c55e; color: white; padding: 8px 15px; border-radius: 5px; text-decoration: none; }
        
        .container { display: flex; justify-content: center; align-items: center; min-height: 90vh; padding: 40px 20px; }
        .register-card { background-color: #24292f; padding: 35px; border-radius: 12px; width: 450px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        
        /* Estilo para a seleção do Tipo de Conta */
        .type-selection { display: flex; gap: 15px; margin-bottom: 25px; }
        .type-option { flex: 1; border: 1px solid #444; border-radius: 8px; padding: 15px; cursor: pointer; transition: 0.3s; text-decoration: none; color: inherit; }
        .type-option:hover { border-color: #22c55e; background-color: rgba(255, 255, 255, 0.05); }
        .type-option i { font-size: 1.5rem; margin-bottom: 8px; color: #888; display: block; }
        
        /* ESTADO VERDINHO (ATIVO) - Agora na Clínica */
        .type-option.active { border-color: #22c55e; background-color: rgba(34, 197, 94, 0.1); }
        .type-option.active i { color: #22c55e; }

        .input-group { text-align: left; margin-bottom: 15px; }
        .input-box { display: flex; align-items: center; background: #2d333b; border: 1px solid #444; border-radius: 8px; padding: 10px; margin-top: 5px; }
        .input-box i { color: #888; margin-right: 10px; width: 20px; text-align: center; }
        .input-box input { background: transparent; border: none; color: white; width: 100%; outline: none; }
        
        .btn-finalizar { background-color: #22c55e; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1rem; }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fas fa-heart"></i> VivaBem</div>
        <div class="menu">
            <a href="#">Início</a>
            <a href="#">Buscar Clínicas</a>
            <a href="#">Sobre</a>
            <a th:href="@{/login}" style="margin-left: 30px;">Entrar</a>
            <a th:href="@{/cadastro}" class="btn-cadastrar-nav">Cadastrar</a>
        </div>
    </nav>

    <div class="container">
        <div class="register-card">
            <div style="color: #22c55e; font-size: 2rem; margin-bottom: 10px;"><i class="fas fa-heart"></i> VivaBem</div>
            <h2 style="margin: 0;">Cadastro de Clínica</h2>
            <p style="color: #888; font-size: 0.9rem; margin-bottom: 30px;">Insira os dados da instituição para continuar</p>

            <form th:action="@{/cadastro-clinica}" method="post">
                
                <label style="display: block; text-align: left; font-size: 0.85rem; margin-bottom: 10px;">Tipo de Conta</label>
                <div class="type-selection">
                    <a th:href="@{/cadastro}" class="type-option">
                        <i class="fas fa-user-circle"></i>
                        <div style="font-size: 0.9rem;">Paciente</div>
                    </a>

                    <div class="type-option active">
                        <i class="fas fa-hospital"></i>
                        <div style="font-size: 0.9rem;">Clínica</div>
                    </div>
                </div>

                <div class="input-group">
                    <label style="font-size: 0.8rem;">Nome da Clínica</label>
                    <div class="input-box">
                        <i class="fas fa-hospital"></i>
                        <input type="text" name="nomeClinica" placeholder="Nome Fantasia" required>
                    </div>
                </div>

                <div class="input-group">
                    <label style="font-size: 0.8rem;">CNPJ</label>
                    <div class="input-box">
                        <i class="fas fa-id-card"></i>
                        <input type="text" name="cnpj" placeholder="00.000.000/0000-00" required>
                    </div>
                </div>

                <div class="input-group">
                    <label style="font-size: 0.8rem;">E-mail Comercial</label>
                    <div class="input-box">
                        <i class="fas fa-envelope"></i>
                        <input type="email" name="email" placeholder="comercial@vivabem.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label style="font-size: 0.8rem;">Senha</label>
                    <div class="input-box">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="senha" placeholder="********" required>
                    </div>
                </div>

                <button type="submit" class="btn-finalizar">Finalizar Cadastro</button>
            </form>
        </div>
    </div>
</body>
</html>
