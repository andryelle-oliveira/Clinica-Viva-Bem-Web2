<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>VivaBem - Recuperar Senha</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #1a1e23; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 50px; background-color: #1a1e23; }
        .logo { color: #22c55e; font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        .container { display: flex; justify-content: center; align-items: center; min-height: 90vh; padding: 20px; }
        .login-card { background-color: #24292f; padding: 35px; border-radius: 12px; width: 380px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-box { display: flex; align-items: center; background: #2d333b; border: 1px solid #444; border-radius: 8px; padding: 10px; margin-top: 5px; }
        .input-box i { color: #888; margin-right: 10px; }
        .input-box input { background: transparent; border: none; color: white; width: 100%; outline: none; }
        .btn-enviar { background-color: #22c55e; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-enviar:hover { background-color: #1ca34d; }
        .alert-success { background-color: rgba(34, 197, 94, 0.2); color: #22c55e; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; border: 1px solid #22c55e; }
        .back-link { display: block; margin-top: 20px; font-size: 0.85rem; color: #888; text-decoration: none; }
        .back-link:hover { color: #22c55e; }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fas fa-heart"></i> VivaBem</div>
    </nav>

    <div class="container">
        <div class="login-card">
            <div style="color: #22c55e; font-size: 1.8rem; margin-bottom: 10px;"><i class="fas fa-key"></i></div>
            <h2 style="margin: 0;">Recuperar Senha</h2>
            <p style="color: #888; font-size: 0.9rem; margin-bottom: 25px;">Informe seu e-mail para receber as instruções de recuperação.</p>

            <div th:if="${mensagem}" class="alert-success">
                <i class="fas fa-check-circle"></i> <span th:text="${mensagem}"></span>
            </div>

            <form th:action="@{/esqueci-senha}" method="post">
                <div class="input-group">
                    <label style="font-size: 0.8rem;">E-mail cadastrado</label>
                    <div class="input-box">
                        <i class="fas fa-envelope"></i>
                        <input type="email" name="email" placeholder="seu@email.com" required>
                    </div>
                </div>

                <button type="submit" class="btn-enviar">Enviar Link de Recuperação</button>
            </form>

            <a th:href="@{/login}" class="back-link">
                <i class="fas fa-arrow-left"></i> Voltar para o Login
            </a>
        </div>
    </div>

</body>
</html>
